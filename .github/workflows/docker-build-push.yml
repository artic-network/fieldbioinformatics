name: quay_build_push

on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Docker meta (default)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/artic/fieldbioinformatics
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}

      - name: Docker meta (models-included)
        id: meta-models
        uses: docker/metadata-action@v5
        with:
          images: quay.io/artic/fieldbioinformatics
          flavor: |
            latest=true
            suffix=-models-included
          tags: |
            type=semver,pattern={{version}}

      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push (default, no models)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INCLUDE_MODELS=false

      - name: Build and push (models-included)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-models.outputs.tags }}
          labels: ${{ steps.meta-models.outputs.labels }}
          build-args: INCLUDE_MODELS=true
